<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Dashboard</title>

        <!-- CSS (go up one level) -->
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <main class="auth-page">
            <section class="auth-card">
                <h1 id="formTitle">Register</h1>

                <form id="authForm">
                    <input type="name" placeholder="First Name" required>
                    <input type="name" placeholder="Last Name" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <input type="password" id="password" placeholder="Confirm Password" required>

                    <button type="submit" id="submitBtn">Sign In</button>
                </form>

                <p id="toggleText">Have an account already?<span id="toggleMode"><a href="login.html">Sign-In</a></span></p>
            </section>
        </main>

        <!-- TEMPORARY SCRIPT TO BYPASS LOGIN/BEFORE LOGIN SETUP TO GET TO THE DASHBOARD -->
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const form = document.getElementById('authForm');

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    sessionStorage.setItem('mockLoggedIn', 'true');
                    window.location.href = 'dashboard.html';
                });
            });
        </script>
    </body>
</html>
