<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/assets/css/login.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
<div class="container">
    <div class="form-container">
        <div class="form-header">
            <p>Please enter your details</p>
            <h1 id="formTitle">Welcome Back</h1>
        </div>

        <form class="form-box" id="loginForm">
            <div class="input-group">
                <input type="email" id="email" name="email" class="input-field" required>
                <label for="email" class="floating-label">Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" class="input-field" required>
                <label for="password" class="floating-label">Password</label>

                <button
                        type="button"
                        class="eye-icon password-toggle"
                        data-target="password"
                        aria-label="Toggle password visibility">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye">
                        <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <div class="input-group checkbox-group">
                <div class="form col remember-me">
                    <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                    <label for="remember-me-checkbox">Remember me</label>
                </div>
                <div class="form-col">
                    <a href="#" class="form-link">Forgot Password?</a>
                </div>
            </div>

            <p id="authStatus" aria-live="polite"></p>

            <button type="submit" class="form-btn form-btn--submit">Sign In</button>
        </form>

        <div class="form-divider">
            <p>Or</p>
        </div>

        <div class="form-bottom">
            <div class="form-socials">
                <button type="button" class="form-btn form-btn--social">
                    <img src="/assets/resources/images.png" class="btn-icon" alt="social icon">
                </button>
                <button type="button" class="form-btn form-btn--social">
                    <img src="/assets/resources/images.png" class="btn-icon" alt="social icon">
                </button>
                <button type="button" class="form-btn form-btn--social">
                    <img src="/assets/resources/images.png" class="btn-icon" alt="social icon">
                </button>
            </div>
            <p>Don't have an account? <a href="/assets/pages/register.html" class="form-link">Sign up</a></p>
        </div>
    </div>
</div>

<script src="/assets/js/auth-session.js"></script>
<script src="/assets/js/auth-api.js"></script>
<script src="/assets/js/auth-page.js"></script>
</body>
</html>
