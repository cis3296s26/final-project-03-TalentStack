<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications – TalentStack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #edecea;
      color: #1a1a1a;
      min-height: 100vh;
    }
 
    /* ── Navbar ── */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; padding: 0 28px; height: 56px;
      border-bottom: 1px solid #e0ddd8;
      position: sticky; top: 0; z-index: 200;
    }
    .navbar-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 36px; height: 36px; background: #3a7d44; border-radius: 6px;
      color: #fff; font-weight: 700; font-size: 13px;
      display: grid; place-items: center; text-decoration: none;
    }
    .search-bar {
      border: none; background: #f0eeeb; border-radius: 6px;
      padding: 6px 14px; font-size: 14px; width: 220px; color: #444; outline: none;
    }
    .search-bar::placeholder { color: #aaa; }
    .navbar-nav { display: flex; align-items: center; gap: 22px; }
    .navbar-nav a {
      text-decoration: none; color: #444; font-size: 14px; font-weight: 500;
      white-space: nowrap; transition: color .15s;
    }
    .navbar-nav a:hover, .navbar-nav a.active { color: #1a1a1a; font-weight: 600; }
    .dropdown { position: relative; }
    .dropbtn {
      background: none; border: none; cursor: pointer;
      font-size: 14px; font-weight: 500; color: #444; padding: 0;
    }
  
    .dropbtn:hover { color: #1a1a1a; }
    .dropdown:hover .dropdown-content { display: block; }
    .dropdown-content {
      display: none; position: absolute; top: calc(100% + 10px); right: 0;
      background: #fff; border: 1px solid #e0ddd8; border-radius: 8px;
      min-width: 160px; box-shadow: 0 4px 14px rgba(0,0,0,.09); overflow: hidden; z-index: 300;
    }
    .dropdown-content a { display: block; padding: 10px 16px; font-size: 13px; color: #444; text-decoration: none; }
    .dropdown-content a:hover { background: #f5f4f1; }
 
    /* ── Layout ── */
    .dashboard { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
 
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h1 { font-size: 26px; font-weight: 700; }
 
    .mark-all-btn {
      background: none; border: none; font-size: 13px; color: #3a7d44;
      font-weight: 600; cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
    }
    .mark-all-btn:hover { color: #2d6235; }
 
    /* ── Filter tabs ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px; border: 1.5px solid #d5d2cd;
      background: #fff; font-size: 13px; font-weight: 500; color: #555; cursor: pointer; transition: all .15s;
    }
    .filter-btn:hover { border-color: #3a7d44; color: #3a7d44; }
    .filter-btn.active { background: #3a7d44; border-color: #3a7d44; color: #fff; }
 
    /* ── Section label ── */
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: #999; margin: 28px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }
 
    /* ── Notif list ── */
    .notif-list { display: flex; flex-direction: column; }
 
    /* ── Notif card ── */
    .notif-card {
      background: #fff; border: 1px solid #e0ddd8; border-top: none;
      padding: 16px 18px; display: flex; align-items: flex-start; gap: 13px;
      cursor: pointer; position: relative; transition: background .15s;
    }
    .notif-list .notif-card:first-child { border-top: 1px solid #e0ddd8; border-radius: 10px 10px 0 0; }
    .notif-list .notif-card:last-child  { border-radius: 0 0 10px 10px; }
    .notif-list .notif-card:only-child  { border-top: 1px solid #e0ddd8; border-radius: 10px; }
    .notif-card:hover { background: #fafaf8; }
    .notif-card.unread { background: #f3f9f4; }
    .notif-card.unread:hover { background: #eaf4eb; }
 
    .unread-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #3a7d44;
      flex-shrink: 0; margin-top: 7px; opacity: 0; transition: opacity .2s;
    }
    .notif-card.unread .unread-dot { opacity: 1; }
 
    .notif-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: grid; place-items: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .notif-icon {
      width: 40px; height: 40px; border-radius: 50%;
      display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
    }
 
    .notif-body { flex: 1; min-width: 0; }
    .notif-text { font-size: 14px; color: #222; line-height: 1.5; }
    .notif-text strong { font-weight: 600; }
    .notif-time { font-size: 12px; color: #999; margin-top: 3px; }
 
    .notif-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-accept {
      padding: 5px 14px; border-radius: 20px; background: #3a7d44; color: #fff;
      border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-accept:hover { background: #2d6235; }
    .btn-decline {
      padding: 5px 14px; border-radius: 20px; background: #fff; color: #555;
      border: 1.5px solid #d5d2cd; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-decline:hover { border-color: #999; color: #333; }
 
    .notif-dismiss {
      position: absolute; top: 13px; right: 14px; background: none; border: none;
      font-size: 18px; color: #ccc; cursor: pointer; opacity: 0; transition: opacity .15s, color .15s; line-height: 1;
    }
    .notif-card:hover .notif-dismiss { opacity: 1; }
    .notif-dismiss:hover { color: #666; }
 
    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 70px 20px; color: #bbb; }
    .empty-state .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
 
    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #222; color: #fff; font-size: 13px;
      padding: 10px 20px; border-radius: 8px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; transition: transform .28s, opacity .28s;
      z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
    #toast button { background: none; border: none; color: #6ed97e; font-size: 13px; font-weight: 700; cursor: pointer; padding: 0; }
 
    /* ── Slide-out ── */
    @keyframes slideOut {
      to { opacity: 0; transform: translateX(24px); max-height: 0; padding-top: 0; padding-bottom: 0; border-width: 0; }
    }
    .notif-card.removing { animation: slideOut .22s ease forwards; overflow: hidden; }
  </style>
</head>
<body>
 
  <header class="navbar">
    <div class="navbar-left">
      <a class="logo" href="../TalentStack/src/main/resources/static/index.html">TS</a>
      <input type="text" placeholder="Search" class="search-bar">
    </div>
    <nav class="navbar-nav">
      <a href="dashboard.html">My Dashboard</a>
      <a href="jobs.html">Browse Jobs</a>
      <div class="dropdown">
        <button class="dropbtn">Career Prep ▾</button>
        <div class="dropdown-content">
          <a href="dashboard.html">Application Status</a>
          <a href="dashboard.html">Interview Prep</a>
          <a href="dashboard.html">Calendar</a>
        </div>
      </div>
      <a href="messages.html">Messaging</a>
      <a href="notifications.html" class="active">Notifications</a>
      <div class="dropdown">
        <button class="dropbtn">Profile ▾</button>
        <div class="dropdown-content">
          <a href="profile.html">Profile</a>
          <a href="settings.html">Settings</a>
          <a href="#">Sign Out</a>
        </div>
      </div>
    </nav>
  </header>
 
  <main class="dashboard">
    <div class="page-header">
      <h1>Notifications</h1>
      <button class="mark-all-btn" onclick="markAllRead()">Mark all as read</button>
    </div>
 
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('unread',this)">Unread</button>
      <button class="filter-btn" onclick="setFilter('connections',this)">Connections</button>
      <button class="filter-btn" onclick="setFilter('jobs',this)">Jobs</button>
      <button class="filter-btn" onclick="setFilter('mentions',this)">Mentions</button>
    </div>
 
    <div id="feed"></div>
  </main>
 
  <div id="toast">
    Notification removed
    <button onclick="undoDismiss()">Undo</button>
  </div>
 
  <script>
    let notifications = [
      { id:1, unread:true,  category:'connections', section:'today',
        initials:'MR', color:'#4a8fd4',
        text:'<strong>Maria Rodriguez</strong> sent you a connection request.',
        time:'2 minutes ago', actions:['accept','decline'] },
      { id:2, unread:true,  category:'jobs', section:'today',
        icon:'💼', iconBg:'#fff3e0',
        text:'<strong>Google</strong> viewed your application for <strong>Software Engineer Intern</strong>.',
        time:'1 hour ago' },
      { id:3, unread:true,  category:'connections', section:'today',
        initials:'JK', color:'#8e44ad',
        text:'<strong>James Kim</strong> accepted your connection request.',
        time:'3 hours ago' },
      { id:4, unread:true,  category:'mentions', section:'today',
        initials:'SL', color:'#e05252',
        text:'<strong>Sarah Lee</strong> mentioned you in a post: "Had a great mock interview with @John Smith today!"',
        time:'5 hours ago' },
      { id:5, unread:false, category:'jobs', section:'earlier',
        icon:'🎉', iconBg:'#e8f5e9',
        text:'You have a <strong>new job match</strong> — Frontend Developer at Stripe. Your profile is a 92% fit.',
        time:'Yesterday at 4:30 PM' },
      { id:6, unread:false, category:'connections', section:'earlier',
        initials:'AP', color:'#1a9e7e',
        text:'<strong>Alex Park</strong> sent you a connection request.',
        time:'Yesterday at 1:12 PM', actions:['accept','decline'] },
      { id:7, unread:false, category:'mentions', section:'earlier',
        icon:'📣', iconBg:'#fce4ec',
        text:'Your post <strong>"5 tips for acing a technical interview"</strong> received 47 likes.',
        time:'2 days ago' },
      { id:8, unread:false, category:'jobs', section:'earlier',
        icon:'📋', iconBg:'#e3f2fd',
        text:'<strong>Meta</strong> posted a new role matching your interests: <strong>Product Manager Intern</strong>.',
        time:'3 days ago' }
    ];
 
    let currentFilter = 'all';
    let lastRemoved   = null;
    let toastTimer    = null;
 
    function render() {
      const feed = document.getElementById('feed');
      let items = currentFilter === 'all'    ? notifications
               : currentFilter === 'unread' ? notifications.filter(n => n.unread)
               : notifications.filter(n => n.category === currentFilter);
 
      if (!items.length) {
        feed.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><p>No notifications here yet.</p></div>`;
        return;
      }
 
      let html = '';
      ['today','earlier'].forEach(sec => {
        const group = items.filter(n => n.section === sec);
        if (!group.length) return;
        html += `<p class="section-label">${sec === 'today' ? 'Today' : 'Earlier'}</p><div class="notif-list">`;
        group.forEach(n => { html += cardHTML(n); });
        html += `</div>`;
      });
      feed.innerHTML = html;
    }
 
    function cardHTML(n) {
      const avatar = n.initials
        ? `<div class="notif-avatar" style="background:${n.color}">${n.initials}</div>`
        : `<div class="notif-icon" style="background:${n.iconBg}">${n.icon}</div>`;
      const actions = (n.actions || []).map(a =>
        a === 'accept'
          ? `<button class="btn-accept"  onclick="handleAction(event,${n.id},'accept')">Accept</button>`
          : `<button class="btn-decline" onclick="handleAction(event,${n.id},'decline')">Decline</button>`
      ).join('');
      return `<div class="notif-card ${n.unread?'unread':''}" id="notif-${n.id}" onclick="markRead(${n.id})">
        <div class="unread-dot"></div>
        ${avatar}
        <div class="notif-body">
          <div class="notif-text">${n.text}</div>
          <div class="notif-time">${n.time}</div>
          ${actions ? `<div class="notif-actions">${actions}</div>` : ''}
        </div>
        <button class="notif-dismiss" title="Dismiss" onclick="dismiss(event,${n.id})">×</button>
      </div>`;
    }
 
    function setFilter(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }
 
    function markRead(id) {
      const n = notifications.find(x => x.id === id);
      if (n) n.unread = false;
      const card = document.getElementById(`notif-${id}`);
      if (card) card.classList.remove('unread');
    }
 
    function markAllRead() {
      notifications.forEach(n => n.unread = false);
      document.querySelectorAll('.notif-card.unread').forEach(c => c.classList.remove('unread'));
    }
 
    function dismiss(e, id) {
      e.stopPropagation();
      const idx = notifications.findIndex(n => n.id === id);
      if (idx === -1) return;
      lastRemoved = { notif: notifications[idx], idx };
      notifications.splice(idx, 1);
      const card = document.getElementById(`notif-${id}`);
      card.classList.add('removing');
      card.addEventListener('animationend', () => { render(); showToast(); }, { once: true });
    }
 
    function handleAction(e, id, type) {
      e.stopPropagation();
      const n = notifications.find(x => x.id === id);
      if (!n) return;
      n.actions = []; n.unread = false;
      n.text += type === 'accept'
        ? ' <span style="color:#3a7d44;font-weight:600">✓ Accepted</span>'
        : ' <span style="color:#aaa;font-weight:600">Declined</span>';
      render();
    }
 
    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
    }
 
    function undoDismiss() {
      if (!lastRemoved) return;
      notifications.splice(lastRemoved.idx, 0, lastRemoved.notif);
      lastRemoved = null;
      document.getElementById('toast').classList.remove('show');
      render();
    }
 
    render();
  </script>
</body>
</html>
