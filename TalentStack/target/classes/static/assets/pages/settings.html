<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <a href="/"><div class="logo">TS</div></a>
        <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
        <a href="/assets/pages/dashboard.html">My Dashboard</a>
        <a href="/assets/pages/jobs.html">Browse Jobs</a>
        <a href="/assets/pages/messages.html">Messaging</a>
        <a href="/assets/pages/notifications.html">Notifications</a>
        <a href="/assets/pages/profile.html">Profile</a>
    </nav>
</header>

<main class="dashboard">
    <div class="page-header">
        <h1>Account Settings</h1>
    </div>

    <div class="basic-info">
        <h2>Basic Information</h2>

        <label for="profileEmail">Email</label>
        <input type="email" id="profileEmail" placeholder="Enter your email">

        <label for="profileFirstName">First Name</label>
        <input type="text" id="profileFirstName" placeholder="Enter your first name">

        <label for="profileLastName">Last Name</label>
        <input type="text" id="profileLastName" placeholder="Enter your last name">

        <p><strong>Created:</strong> <span id="profileCreatedAt">Unavailable</span></p>
        <p id="profileStatus" aria-live="polite"></p>

        <button class="primary-btn bubbly-btn" id="saveProfileButton" type="button">Save Information</button>
    </div>
</main>

<script src="/assets/js/auth-session.js"></script>
<script src="/assets/js/profile-api.js"></script>
<script src="/assets/js/settings-page.js"></script>
<script src="/assets/js/nav.js"></script>
</body>
</html>
