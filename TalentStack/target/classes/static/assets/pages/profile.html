<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <a href="/"><div class="logo">TS</div></a>
        <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
        <a href="/assets/pages/dashboard.html">My Dashboard</a>
        <a href="/assets/pages/jobs.html">Browse Jobs</a>
        <a href="/assets/pages/messages.html">Messaging</a>
        <a href="/assets/pages/notifications.html">Notifications</a>
        <a href="/assets/pages/settings.html">Settings</a>
    </nav>
</header>

<main class="dashboard">
    <div class="page-header"><h1>Profile</h1></div>

    <div class="profile-info" id="profileInfoSection">
        <div class="profile-field"><label>Email: </label><span id="displayEmail" class="profile-value">Not Set</span></div>
        <div class="profile-field"><label>First Name: </label><span id="displayFirstName" class="profile-value">Not Set</span></div>
        <div class="profile-field"><label>Last Name: </label><span id="displayLastName" class="profile-value">Not Set</span></div>
        <div class="profile-field"><label>Created: </label><span id="displayCreatedAt" class="profile-value">Unavailable</span></div>
    </div>

    <p id="profileStatus" aria-live="polite"></p>

    <div style="text-align: center; margin-top: 30px;">
        <a href="/assets/pages/settings.html" class="primary-btn bubbly-btn" style="display: inline-block; padding: 16px 32px; font-size: 1.1rem;">Edit Profile</a>
    </div>
</main>

<script src="/assets/js/auth-session.js"></script>
<script src="/assets/js/profile-api.js"></script>
<script src="/assets/js/profile-page.js"></script>
<script src="/assets/js/nav.js"></script>
</body>
</html>
